<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Klasifikasi Gizi Balita SVM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        puskesmas: {
                            light: '#14b8a6', // Teal 500
                            DEFAULT: '#0d9488', // Teal 600
                            dark: '#0f766e', // Teal 700
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 shadow-sm">
            <div class="mb-8">
                <h2 class="text-xl font-bold text-gray-900 leading-tight">
                    Puskesmas<br>
                    <span class="text-puskesmas">Simpang Teritip</span>
                </h2>
            </div>
            <ul class="space-y-2">
                <li>
                    <a href="#" class="block px-4 py-2.5 rounded-lg bg-teal-50 text-puskesmas font-semibold transition-colors">
                        Dashboard SVM
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
                        Data Balita
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
                        Laporan Gizi
                    </a>
                </li>
            </ul>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10">
                <div class="mb-4 sm:mb-0">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Klasifikasi Status Gizi Balita</h1>
                    <p class="text-gray-500 mt-1">Metode Support Vector Machine (SVM)</p>
                </div>
                <div class="flex items-center space-x-3 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100">
                    <div class="w-8 h-8 rounded-full bg-puskesmas text-white flex items-center justify-center font-bold">
                        P
                    </div>
                    <span class="font-medium text-sm text-gray-700">Petugas Gizi</span>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6 md:p-8">
                    <h3 class="text-lg font-semibold text-gray-800 border-b border-gray-100 pb-4 mb-6">Form Input Pengukuran (Z-Score)</h3>
                    
                    <div id="form-balita" class="space-y-6">
                        
                        <div>
                            <label for="nama" class="block text-sm font-medium text-gray-700 mb-1.5">Nama Balita</label>
                            <input type="text" id="nama" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-puskesmas focus:border-puskesmas outline-none transition-all" placeholder="Masukkan nama lengkap balita" required>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                                <label for="usia" class="block text-sm font-medium text-gray-700 mb-1.5">Usia (Bulan)</label>
                                <input type="number" step="0.01" id="usia" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-puskesmas focus:border-puskesmas outline-none transition-all" placeholder="Contoh: 24.5" required>
                            </div>
                            <div>
                                <label for="zs_bbu" class="block text-sm font-medium text-gray-700 mb-1.5">Z-Score BB/U</label>
                                <input type="number" step="0.01" id="zs_bbu" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-puskesmas focus:border-puskesmas outline-none transition-all" placeholder="Contoh: -1.2" required>
                            </div>
                            <div>
                                <label for="zs_tbu" class="block text-sm font-medium text-gray-700 mb-1.5">Z-Score TB/U</label>
                                <input type="number" step="0.01" id="zs_tbu" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-puskesmas focus:border-puskesmas outline-none transition-all" placeholder="Contoh: 0.5" required>
                            </div>
                            <div>
                                <label for="zs_bbtb" class="block text-sm font-medium text-gray-700 mb-1.5">Z-Score BB/TB</label>
                                <input type="number" step="0.01" id="zs_bbtb" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-puskesmas focus:border-puskesmas outline-none transition-all" placeholder="Contoh: -2.3" required>
                            </div>
                        </div>

                        <div class="pt-4 flex justify-end">
                            <button onclick="prosesPrediksi()" id="btn-submit" class="w-full sm:w-auto px-6 py-3 bg-puskesmas hover:bg-puskesmas-dark text-white font-semibold rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                                <svg id="icon-loading" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <span id="text-submit">Proses Prediksi SVM</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-gray-100 p-6 md:p-8 flex flex-col h-full">
                    <h3 class="text-lg font-semibold text-gray-800 border-b border-gray-100 pb-4 mb-6">Hasil Prediksi Sistem</h3>
                    
                    <div id="result-container" class="flex-1 flex flex-col justify-center items-center text-center p-6 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 transition-all duration-300">
                        <p class="text-sm font-medium text-gray-500 mb-2 uppercase tracking-wide">Status Gizi (BB/TB)</p>
                        
                        <h2 id="hasil-teks" class="text-xl md:text-2xl font-bold text-gray-400">
                            Menunggu Data...
                        </h2>
                        
                        <p id="hasil-detail" class="text-sm text-gray-500 mt-3 hidden">
                            Data telah tersimpan di sistem.
                        </p>
                    </div>

                    <div class="mt-6 flex flex-col gap-3">
                        <button class="w-full px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium rounded-lg transition-colors">
                            Lihat Riwayat
                        </button>
                    </div>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        async function prosesPrediksi() {
            // Element Referensi
            const btnSubmit = document.getElementById('btn-submit');
            const textSubmit = document.getElementById('text-submit');
            const iconLoading = document.getElementById('icon-loading');
            const hasilTeks = document.getElementById('hasil-teks');
            const resultContainer = document.getElementById('result-container');
            const hasilDetail = document.getElementById('hasil-detail');

            // Ambil Nilai Input
            const nama = document.getElementById('nama').value.trim();
            const usia = document.getElementById('usia').value;
            const zs_bbu = document.getElementById('zs_bbu').value;
            const zs_tbu = document.getElementById('zs_tbu').value;
            const zs_bbtb = document.getElementById('zs_bbtb').value;

            // Validasi Input
            if(!nama || !usia || !zs_bbu || !zs_tbu || !zs_bbtb) {
                alert("Mohon lengkapi semua data form sebelum memproses.");
                return;
            }

            // --- Mulai Loading State ---
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');
            textSubmit.innerText = "Memproses...";
            iconLoading.classList.remove('hidden');
            
            hasilTeks.innerText = "Menganalisis...";
            hasilTeks.className = "text-xl font-bold text-gray-500 animate-pulse";
            resultContainer.className = "flex-1 flex flex-col justify-center items-center text-center p-6 bg-gray-100 rounded-xl border border-gray-300 transition-all duration-300";
            hasilDetail.classList.add('hidden');

            try {
                // Konfigurasi Data (JSON)
                const dataInput = {
                    nama: nama,
                    usia: parseFloat(usia),
                    zs_bbu: parseFloat(zs_bbu),
                    zs_tbu: parseFloat(zs_tbu),
                    zs_bbtb: parseFloat(zs_bbtb)
                };

                // Request ke API Flask
                const respon = await fetch('/api/v1/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataInput)
                });

                const hasil = await respon.json();

                if (hasil.status === 'success') {
                    // --- Sukses State ---
                    const statusGizi = hasil.data.status_gizi;
                    hasilTeks.innerText = statusGizi;
                    
                    // Logika Warna Berdasarkan Status Gizi (Tailwind Classes)
                    let warnaTeks = "text-gray-800";
                    let warnaBg = "bg-gray-50";
                    let warnaBorder = "border-gray-200";

                    if (statusGizi.toLowerCase().includes('kurang') || statusGizi.toLowerCase().includes('buruk')) {
                        warnaTeks = "text-red-600";
                        warnaBg = "bg-red-50";
                        warnaBorder = "border-red-200";
                    } else if (statusGizi.toLowerCase().includes('baik')) {
                        warnaTeks = "text-green-600";
                        warnaBg = "bg-green-50";
                        warnaBorder = "border-green-200";
                    } else if (statusGizi.toLowerCase().includes('lebih') || statusGizi.toLowerCase().includes('obesitas')) {
                        warnaTeks = "text-amber-600";
                        warnaBg = "bg-amber-50";
                        warnaBorder = "border-amber-200";
                    }

                    hasilTeks.className = `text-2xl md:text-3xl font-bold ${warnaTeks}`;
                    resultContainer.className = `flex-1 flex flex-col justify-center items-center text-center p-6 rounded-xl border-2 ${warnaBg} ${warnaBorder} transition-all duration-300`;
                    
                    hasilDetail.innerText = `Data ${nama} berhasil disimpan ke MySQL.`;
                    hasilDetail.classList.remove('hidden');

                    // Reset Form
                    document.getElementById('nama').value = '';
                    
                } else {
                    // --- Error dari Server ---
                    hasilTeks.innerText = "Gagal Diproses";
                    hasilTeks.className = "text-xl font-bold text-red-500";
                    alert("Error dari Server: " + hasil.message);
                }

            } catch (error) {
                // --- Error Koneksi ---
                console.error("Error Fetch:", error);
                hasilTeks.innerText = "Koneksi Terputus";
                hasilTeks.className = "text-xl font-bold text-red-500";
                alert("Gagal menghubungi server API. Pastikan Flask berjalan.");
            } finally {
                // --- Akhiri Loading State ---
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
                textSubmit.innerText = "Proses Prediksi SVM";
                iconLoading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
