<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Log Aktivitas</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Log Aktivitas Sistem</h2>
            <a href="{{ url_for('web.home') }}" class="text-blue-500 hover:underline">Kembali ke Dashboard</a>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border">
                <thead>
                    <tr class="bg-gray-800 text-white text-left">
                        <th class="py-3 px-4 border-b">Waktu</th>
                        <th class="py-3 px-4 border-b">Pengguna</th>
                        <th class="py-3 px-4 border-b">Aksi yang Dilakukan</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="py-2 px-4 text-sm text-gray-600 whitespace-nowrap">
                            {{ log.waktu.strftime('%d-%m-%Y %H:%M') }}
                        </td>
                        <td class="py-2 px-4 font-medium">{{ log.user.nama }} ({{ log.user.role }})</td>
                        <td class="py-2 px-4 text-gray-700">{{ log.aksi }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="py-4 text-center text-gray-500">Belum ada aktivitas tercatat.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
