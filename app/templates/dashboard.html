<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Puskesmas Simpang Teritip</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d9488">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 3px solid #0d9488; color: #0d9488; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-50 relative"> <div class="h-screen overflow-hidden"> 
        
        <aside id="sidebar" class="w-64 bg-teal-900 text-white flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 h-screen shadow-2xl">
            <button onclick="toggleSidebar()" class="absolute top-4 right-4 md:hidden text-teal-300 hover:text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <div class="p-6">
                <img src="{{ url_for('static', filename='assets/img/Kabupaten-Bangka-Barat.png') }}" alt="Logo Puskesmas" class="w-12 h-12 mb-4">
                <h1 class="text-xl font-black tracking-tighter uppercase">Puskesmas Simpang Teritip</h1>
                <p class="text-xs text-teal-300">Sistem Informasi Gizi SVM</p>
            </div>
    
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <a href="#" onclick="switchTab('dashboard')" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Dashboard Utama</a>
                <a href="#" onclick="switchTab('pencarian')" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Pencarian Data</a>
                <a href="{{ url_for('web.input_data') }}" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Input Data Baru</a>
                
                {% if user.role == 'admin' %}
                <a href="{{ url_for('admin.manajemen_akun') }}" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Manajemen Akun</a>
                <a href="{{ url_for('admin.sistem_log') }}" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Sistem Log</a>
                {% endif %}
                
                <a href="#" onclick="switchTab('informasi')" class="block py-3 px-4 rounded-lg hover:bg-teal-800 transition font-medium">Info & Edukasi</a>
            </nav>
    
            <div class="p-4 border-t border-teal-800">
                <a href="{{ url_for('web.logout') }}" class="text-sm text-teal-400 hover:text-white">Keluar Sistem</a>
            </div>
        </aside>

        <main class="absolute inset-0 md:pl-64 flex flex-col h-screen overflow-y-auto w-full transition-all duration-300">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center w-full sticky top-0 z-40">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 id="tab-title" class="text-base sm:text-lg font-bold text-slate-800">Ringkasan Statistik Gizi</h2>
                </div>

                <div class="flex items-center gap-2 sm:gap-4">
                    <span class="text-sm text-slate-500 hidden sm:inline-block">Halo, {{ user.role }}</span>
                    <div class="w-8 h-8 bg-teal-600 rounded-full flex items-center justify-center text-white font-bold text-xs shrink-0">PT</div>
                </div>
            </header>

            <div class="p-4 md:p-8"> <section id="tab-dashboard" class="space-y-8">
                    </section>
                
                <section id="tab-pencarian" class="hidden space-y-6">
                    </section>
                
                <section id="tab-informasi" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </section>
            </div>
        </main>
    </div>

    <script>
        let map; // Variabel global untuk peta
        function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        
        // Memanipulasi class -translate-x-full (geser keluar layar)
        sidebar.classList.toggle('-translate-x-full');
        
        // Memungkinkan sidebar di desktop juga ikut bisa ditutup
        sidebar.classList.toggle('md:translate-x-0');
    }

        // Logika Navigasi Tab
        function switchTab(tabId) {
            document.getElementById('tab-dashboard').classList.add('hidden');
            document.getElementById('tab-pencarian').classList.add('hidden');
            document.getElementById('tab-informasi').classList.add('hidden');

            document.getElementById('tab-' + tabId).classList.remove('hidden');

            const titles = {
                'dashboard': 'Ringkasan Statistik Gizi',
                'pencarian': 'Pencarian Data Balita',
                'informasi': 'Informasi Edukasi Gizi'
            };
            document.getElementById('tab-title').innerText = titles[tabId];

            // Trik untuk mencegah map Leaflet menjadi abu-abu saat ganti tab
            if (tabId === 'dashboard' && map) {
                setTimeout(function() {
                    map.invalidateSize();
                }, 100);
            }
        }

        // Jalankan tab dashboard pada awal halaman dimuat
        switchTab('dashboard');

        let searchTimeout = null;

        async function fetchSearchData() {
            const input = document.getElementById('searchInput').value;
            const tableBody = document.getElementById('tableBody');
            
            if (input.trim() === '') {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">Gunakan kotak di atas untuk mencari data.</td></tr>';
                return;
            }

            tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-teal-500 animate-pulse font-bold">Mencari data di database...</td></tr>';

            try {
                const response = await fetch(`/api/v1/search?q=${encodeURIComponent(input)}`);
                const result = await response.json();

                if (result.status === 'success') {
                    tableBody.innerHTML = ''; 
                    
                    if (result.data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-400 font-medium">Data balita tidak ditemukan.</td></tr>';
                        return;
                    }

                    result.data.forEach(item => {
                        let badgeColor = "bg-slate-100 text-slate-700";
                        const statusL = item.status_terakhir.toLowerCase();
                        
                        if (statusL.includes('kurang') || statusL.includes('buruk') || statusL.includes('pendek')) {
                            badgeColor = "bg-red-100 text-red-700";
                        } else if (statusL.includes('lebih') || statusL.includes('obesitas')) {
                            badgeColor = "bg-orange-100 text-orange-700";
                        } else if (statusL.includes('baik') || statusL.includes('normal')) {
                            badgeColor = "bg-teal-100 text-teal-700";
                        }

                        const row = `
                            <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                                <td class="px-6 py-4 font-mono text-sm">${item.nik_ibu}</td>
                                <td class="px-6 py-4 font-bold text-slate-800">${item.nama_anak}</td>
                                <td class="px-6 py-4 text-slate-600">${item.nama_ibu}</td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 ${badgeColor} rounded-full text-xs font-bold">${item.status_terakhir}</span>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <a href="/data-anak" class="text-white font-bold text-xs bg-teal-600 hover:bg-teal-700 px-4 py-2 rounded-lg transition shadow-sm">Buka Data</a>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-500 font-bold">Terjadi kesalahan koneksi ke server.</td></tr>';
            }
        }

        function filterData() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(fetchSearchData, 500);
        }

        function initMap(data) {
            if (map) map.remove(); 
            // Koordinat disesuaikan ke area Bangka Barat / Simpang Teritip
            map = L.map('map').setView([-1.815, 105.445], 11); 
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            if(data && data.length > 0) {
                data.forEach(p => {
                    const color = p.status.includes('Buruk') ? 'red' : 'green';
                    L.circleMarker([p.lat, p.lng], { color: color, radius: 8 }).addTo(map)
                        .bindPopup(`<b>${p.nama}</b><br>Status: ${p.status}`);
                });
            }
        }

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/v1/stats');
                const d = await res.json();

                if (d.status === 'success') {
                    document.getElementById('stat-total').innerText = d.summary.total;
                    document.getElementById('stat-buruk').innerText = d.summary.buruk;
                    document.getElementById('stat-stunting').innerText = d.summary.stunting;
                    document.getElementById('stat-baik').innerText = d.summary.baik;
                }

                new Chart(document.getElementById('chartGizi'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(d.gizi),
                        datasets: [{ data: Object.values(d.gizi), backgroundColor: ['#0d9488', '#f59e0b', '#ef4444', '#3b82f6'] }]
                    },
                    options: { maintainAspectRatio: false }
                });

                // Render Bar Chart Desa
                new Chart(document.getElementById('chartDesa'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(d.desa),
                        datasets: [{ label: 'Jumlah Anak', data: Object.values(d.desa), backgroundColor: '#0d9488', borderRadius: 4 }]
                    },
                    options: { maintainAspectRatio: false }
                });

                initMap(d.map);


            } catch(e) {
                console.error("Gagal memuat statistik", e);
                // kosongin map jika gaada data nya
                initMap([]); 
            }
        }

        window.onload = loadDashboardData;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                  .then(registration => console.log('PWA SW didaftarkan'))
                  .catch(err => console.log('PWA SW gagal', err));
            });
        }

    </script>
</body>
</html>
